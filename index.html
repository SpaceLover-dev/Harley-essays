<!DOCTYPE html>
<html>
<head>
  <title>Writing Archive</title>
</head>
<body style="font-family: Georgia, serif; max-width:700px; margin:auto; padding:40px;">

<h1>Writing Archive</h1>

{% for post in site.posts %}
  <div style="margin-bottom:20px;">
    <h2>{{ post.title }}</h2>
    <a href="{{ post.url }}">Read →</a>
  </div>
{% endfor %}

</body>
</html>
